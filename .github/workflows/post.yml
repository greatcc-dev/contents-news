name: YouTube Insights → Threads

on:
  schedule:
    # KST 기준: 06:00, 12:00, 18:00, 00:00 (UTC +9)
    - cron: '0 21 * * *'   # KST 06:00
    - cron: '0 3 * * *'    # KST 12:00
    - cron: '0 9 * * *'    # KST 18:00
    - cron: '0 15 * * *'   # KST 00:00

  # 수동 실행 (GitHub Actions 탭에서 [Run workflow] 버튼으로 테스트 가능)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (게시 없이 테스트)'
        required: false
        default: 'false'
        type: boolean

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 코드
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 인사이트 수집 및 게시
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi
